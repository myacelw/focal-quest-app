name: Deploy PWA to GitHub Pages

# 推送到 master 时自动构建纯前端 PWA 并发布到 GitHub Pages（也可在 Actions 页手动触发）。
# 仓库需为 public（免费版）。Pages 由下方 configure-pages 的 enablement 自动开启。
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # vosk 模型已切片入库（public/models/*.part* + parts.json），无需下载。
      # base 用仓库名（项目页在 /<repo>/ 子路径下）；纯前端不带后端。
      - name: 构建
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_BACKEND: 'off'

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
