name: Deploy PWA to GitHub Pages

# 推送到 master 时自动构建纯前端 PWA 并发布到 GitHub Pages（也可在 Actions 页手动触发）。
# 注意：需在仓库 Settings → Pages → Source 选 "GitHub Actions" 才会生效。
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新推送取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # vosk 模型不入库，构建时从官方源下载并转成 vosk-browser 需要的 tar.gz
      # （GitHub runner 在境外，访问 alphacephei.com 稳定；国内电脑则用 scripts/prepare-vosk-model.ps1）
      - name: 准备 vosk 中文模型
        run: |
          curl -L --fail -o /tmp/vosk.zip https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.zip
          mkdir -p public/models
          unzip -q /tmp/vosk.zip -d public/models
          tar -czf public/models/vosk-model-small-cn-0.22.tar.gz -C public/models vosk-model-small-cn-0.22
          rm -rf public/models/vosk-model-small-cn-0.22 /tmp/vosk.zip

      # base 用仓库名（项目页在 /<repo>/ 子路径下）；纯前端不带后端
      - name: 构建
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_BACKEND: 'off'

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
